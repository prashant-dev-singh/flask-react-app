<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Manager</title>

    <!-- ✅ Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🛒 Item Manager</h1>

    <!-- ✅ Add Item Card -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            Add New Item
        </div>
        <div class="card-body">
            <form method="POST" action="/items" class="row g-3">
                <div class="col-md-5">
                    <input type="text" name="name" class="form-control" placeholder="Item Name" required>
                </div>
                <div class="col-md-5">
                    <input type="number" name="price" class="form-control" placeholder="Price" required>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-success w-100">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ✅ Items Table -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            Items List
        </div>
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price (₹)</th>
                        <th>Update</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.id }}</td>
                        <td>{{ item.name }}</td>
                        <td>₹{{ item.price }}</td>

                        <!-- ✅ Update Form -->
                        <td>
                            <form method="POST" action="/update/{{ item.id }}" class="d-flex gap-2">
                                <input type="text" name="name" class="form-control form-control-sm" placeholder="New name">
                                <input type="number" name="price" class="form-control form-control-sm" placeholder="New price">
                                <button class="btn btn-warning btn-sm">Update</button>
                            </form>
                        </td>

                        <!-- ✅ Delete Button -->
                        <td>
                            <form method="POST" action="/delete/{{ item.id }}">
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
